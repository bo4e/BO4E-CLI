[package]
name = "bo4e-codegen"
version = "0.1.0"
edition = "2024"

[features]
default = ["python"]
python = ["python-pydantic", "python-sql-model"]
python-pydantic   = []
python-sql-model  = []

[dependencies]
bo4e-schemas = { path = "../bo4e-schemas" }
clap         = { version = "4.5", features = ["derive"] }
minijinja    = "2"
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
thiserror    = "2"

[dev-dependencies]
tempfile = "3"
walkdir  = "2"
