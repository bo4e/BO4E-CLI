name: Dependabot auto-approve / -merge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  dependabot:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve PR number
        id: pr
        env:
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          NUM="$PR_NUMBER"
          if [ -z "$NUM" ] || [ "$NUM" = "null" ]; then
            echo "::warning::No PR associated with this workflow_run; nothing to do."
            exit 0
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
      - name: Approve PR
        if: steps.pr.outputs.number != ''
        run: gh pr review --approve --repo "$GITHUB_REPOSITORY" "${{ steps.pr.outputs.number }}"
      - name: Enable auto-merge
        if: steps.pr.outputs.number != ''
        run: gh pr merge --auto --squash --repo "$GITHUB_REPOSITORY" "${{ steps.pr.outputs.number }}"
